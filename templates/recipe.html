<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ meal.strMeal }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <a href="/" class="btn btn-outline-secondary mb-4">← Назад</a>
    <div class="row g-5">
        <div class="col-md-5">
            <img src="{{ meal.strMealThumb }}" class="img-fluid rounded-4 shadow">
            <div class="card mt-4 border-0 shadow-sm p-4">
                <h4 class="fw-bold mb-3">Ингредиенты</h4>
                <ul class="list-group list-group-flush">
                    {% for item in ingredients %}
                    <li class="list-group-item bg-transparent px-0">{{ item }}</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
        <div class="col-md-7">
            <h1 class="display-4 fw-bold text-primary">{{ meal.strMeal }}</h1>
            <p class="badge bg-info text-dark fs-6">{{ meal.strCategory }} | {{ meal.strArea }}</p>
            <h4 class="mt-4 fw-bold">Инструкция по приготовлению</h4>
            <p class="mt-3 text-muted" style="line-height: 1.8; white-space: pre-line;">{{ meal.strInstructions }}</p>
            {% if meal.strYoutube %}
            <a href="{{ meal.strYoutube }}" target="_blank" class="btn btn-danger mt-4">Смотреть на YouTube</a>
            {% endif %}
        </div>
    </div>
</div>
</body>
</html>
